name: Auto Tweet Daily

permissions:
  contents: write

on:
  schedule:
    # Runs every day at 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Tweet
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python generate_tweet.py

      - name: Commit updated round-robin state
        run: |
          if [ -n "$(git status --porcelain topic_state.txt)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add topic_state.txt
            git commit -m "chore: update round-robin topic state"
            git push
          else
            echo "No state change to commit."
          fi
